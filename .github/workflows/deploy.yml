name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      # vendored minifiers cover the offline case; install as a safety net
      - run: pip install rcssmin rjsmin

      # rebuild dist with the correct public URL for this repo
      # → https://<owner>.github.io/<repo>  (auto-fills sitemap/robots/og)
      - name: Build production dist
        run: >
          python tools/build.py
          --base-url "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}"

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
